baseURL = 'https://paperwhite.nickolaskraus.io'
languageCode = 'en-US'
title = 'Paperwhite'
theme = 'paperwhite'
description = 'A minimalist Hugo theme using Tailwind CSS and vanilla JavaScript'
keywords = ['blog', 'minimal', 'light', 'tailwind']

[markup]
  [markup.highlight]
    # Disable syntax highlighting.
    noClasses = false

# Google Analytics measurement ID (Google Analytics 4)
# [services]
#   [services.googleAnalytics]
#     id = 'G-MEASUREMENT_ID'

[params]

  [params.author]
    name = 'Nickolas Kraus'
    homepage = 'https://nickolaskraus.io'

  [params.seo]
    og_image = 'logo.png'
    twitter_image = 'logo.png'
    twitter_site = '@nickolashkraus'
    twitter_creator = '@nickolashkraus'

  [[params.socials]]
    icon = 'fa-sharp fa-regular fa-envelope'
    name = 'Email'
    url = 'mailto:0x@nickolaskraus.io'

  [[params.socials]]
    icon = 'fa-brands fa-github'
    name = 'GitHub'
    url = 'https://github.com/nickolashkraus/paperwhite'

[[menus.main]]
name = 'Home'
pageRef = '/'
weight = 10

[[menus.main]]
name = 'Docs'
pageRef = '/docs'
weight = 20

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
